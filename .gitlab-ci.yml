# Pipeline CI/CD GitLab pour mypublicip
# Publication automatique vers Nexus PyPI sur jeysrv12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"
  NEXUS_PYPI_URL: "http://jeysrv12:8081/repository/pypi-releases/"

cache:
  paths:
    - .cache/pip
    - venv/

stages:
  - test
  - build
  - publish
  - mirror

.python_template: &python_template
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - python -V
    - pip install --upgrade pip
    - pip install build twine pytest

# ========================================
# STAGE 1: Validation
# ========================================
test:quality:
  <<: *python_template
  stage: test
  script:
    - echo "📊 Vérification de la structure mypublicip..."
    - test -f pyproject.toml && echo "✅ pyproject.toml présent"
    - test -f README.md && echo "✅ README.md présent"
    - test -d mypublicip && echo "✅ Répertoire mypublicip présent"
    - pip install -e .
    - python -c "import mypublicip; print('✅ Import OK')"
    - echo "✅ Validation terminée"
  only:
    - branches
    - merge_requests
    - tags

# ========================================
# STAGE 2: Build
# ========================================
build:package:
  <<: *python_template
  stage: build
  script:
    - echo "📦 Build du package mypublicip..."
    - |
      CURRENT_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
      echo "📦 Version: ${CURRENT_VERSION}"
    - python -m build
    - echo "📋 Packages créés:"
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
      - pyproject.toml
    expire_in: 1 week
  only:
    - main
    - master
    - tags

# ========================================
# STAGE 3: Publication vers Nexus
# ========================================
publish:nexus:
  <<: *python_template
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl
    - python -V
    - pip install --upgrade pip
    - pip install build twine
    - pip install git+http://jeysrv12:8090/jeyriku/jeyriku-vault.git -q
  script:
    - echo "🚀 Publication mypublicip vers Nexus PyPI Repository..."
    - echo "Repository -> ${NEXUS_PYPI_URL}"
    - |
      python3 - <<'PY'
      import base64
      import os
      from pathlib import Path

      def first(*names):
          for name in names:
              value = os.environ.get(name)
              if value:
                  return value
          return ""

      nexus_url = os.environ["NEXUS_PYPI_URL"]
      username = first("NEXUS_USERNAME", "NEXUS_USER", "NEXUS_LOGIN")
      password = first("NEXUS_PASSWORD", "NEXUS_PASSWD", "NEXUS_PASS", "NEXUS_PWD")

      if not username or not password:
          master = first("VAULT_MASTER_PASSWORD", "VAULT_PASSWORD", "VAULT_MASTER_PASSWD")
          vault_enc = os.environ.get("VAULT_ENC", "")
          if master:
              from jeyriku_vault import VaultManager

              if vault_enc:
                  vault_dir = Path.home() / ".jeyriku"
                  vault_dir.mkdir(parents=True, exist_ok=True)
                  (vault_dir / "vault.enc").write_bytes(base64.b64decode(vault_enc))

              vm = VaultManager(backend="encrypted_file")
              vm.unlock(master)
              cred = vm.get_credential("nexus")
              username = username or getattr(cred, "username", "")
              password = password or getattr(cred, "password", "")

      if not username or not password:
          raise SystemExit("Missing Nexus credentials (vault and env fallback failed)")

      pypirc = (
          "[distutils]\n"
          "index-servers = nexus\n\n"
          "[nexus]\n"
          f"repository = {nexus_url}\n"
          f"username = {username}\n"
          f"password = {password}\n"
      )
      p = Path.home() / ".pypirc"
      p.write_text(pypirc)
      os.chmod(p, 0o600)
      print("✅ .pypirc généré")
      PY
    - echo "📤 Upload vers Nexus..."
    - |
      PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
      ALREADY=$(curl -sf "http://jeysrv12:8081/repository/pypi-releases/simple/mypublicip/" 2>/dev/null | grep -c "mypublicip-${PKG_VERSION}" || echo "0")
      if [ "$ALREADY" -gt "0" ]; then
        echo "ℹ️ Version ${PKG_VERSION} déjà présente sur Nexus — upload ignoré"
      else
        twine upload --repository nexus dist/* --verbose
        echo "✅ mypublicip publié avec succès sur Nexus!"
      fi
    - echo "📍 Accès -> http://jeysrv12:8081/repository/pypi-releases/"
  dependencies:
    - build:package
  only:
    - main
    - master
    - tags
  when: on_success

cleanup:on_failure:
  stage: publish
  script:
    - echo "🧹 Nettoyage après échec du pipeline..."
    - rm -rf dist/ build/ *.egg-info
    - echo "✅ Nettoyage terminé"
  when: on_failure
  allow_failure: true

# ========================================
# STAGE 4: Mirror GitLab -> GitHub
# ========================================
mirror:github:
  stage: mirror
  image: alpine:3.20
  before_script:
    - apk add --no-cache git
  script:
    - echo "🔁 Mirror mypublicip vers GitHub..."
    - |
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "❌ Missing GITHUB_MIRROR_TOKEN CI variable"
        exit 1
      fi
    - git config --global user.email "ci@jeyriku.net"
    - git config --global user.name "GitLab CI"
    - git remote add github-mirror "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/jeyriku/mypublicip.git"
    - git push --force github-mirror "HEAD:refs/heads/main"
    - git push --force github-mirror "HEAD:refs/heads/master"
    - git push --force github-mirror --tags
    - echo "✅ Mirror GitHub mypublicip OK"
  only:
    - main
    - master
    - tags
  when: on_success
