# Pipeline CI/CD GitLab pour mypublicip
# Publication automatique vers Nexus PyPI sur jeysrv12

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"
  NEXUS_PYPI_URL: "http://jeysrv12:8081/repository/pypi-releases/"

cache:
  paths:
    - .cache/pip

stages:
  - test
  - build
  - publish

.python_template: &python_template
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - python -V
    - pip install --upgrade pip

# ========================================
# STAGE 1: Validation
# ========================================
test:quality:
  <<: *python_template
  stage: test
  script:
    - echo "📊 Vérification de la structure mypublicip..."
    - test -f pyproject.toml && echo "✅ pyproject.toml présent"
    - test -f README.md && echo "✅ README.md présent"
    - test -d mypublicip && echo "✅ Répertoire mypublicip présent"
    - pip install -e .
    - python -c "import mypublicip; print('✅ Import OK')"
    - echo "✅ Validation terminée"
  only:
    - branches
    - merge_requests
    - tags

# ========================================
# STAGE 2: Build
# ========================================
build:package:
  <<: *python_template
  stage: build
  script:
    - pip install build
    - echo "📦 Build du package mypublicip..."
    - python -m build
    - echo "📋 Packages créés:"
    - ls -lh dist/
  artifacts:
    paths:
      - dist/
      - pyproject.toml
    expire_in: 1 week
  only:
    - main
    - master
    - tags

# ========================================
# STAGE 3: Publication vers Nexus
# ========================================
publish:nexus:
  <<: *python_template
  stage: publish
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - python -V
    - pip install --upgrade pip build twine
    - pip install git+http://jeysrv12:8090/jeyriku/jeyriku-vault.git -q
    - mkdir -p ~/.jeyriku
    - printf '%s' "$VAULT_ENC" | base64 -d > ~/.jeyriku/vault.enc
  script:
    - echo "🚀 Publication mypublicip vers Nexus PyPI Repository..."
    - echo "Repository -> ${NEXUS_PYPI_URL}"
    - |
      python3 -c "
      import os
      from jeyriku_vault import VaultManager
      vm = VaultManager(backend='encrypted_file')
      vm.unlock(os.environ['VAULT_MASTER_PASSWORD'])
      cred = vm.get_credential('nexus')
      content = '[distutils]\nindex-servers = nexus\n\n[nexus]\nrepository: {}\nusername: {}\npassword: {}\n'.format(os.environ['NEXUS_PYPI_URL'], cred.username, cred.password)
      open(os.path.expanduser('~/.pypirc'), 'w').write(content)
      print('✅ .pypirc créé')
      "
    - chmod 600 ~/.pypirc
    - twine upload --repository nexus dist/* --verbose
    - echo "✅ mypublicip publié avec succès sur Nexus!"
  dependencies:
    - build:package
  only:
    - tags
  when: on_success
